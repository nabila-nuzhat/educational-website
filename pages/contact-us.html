    <!-- contact form -->

    <section class="container">
        <div class="row">
            <div class="col text-center ">
                <h3 class="fs-1 py-5">Contact Us</h3>
                
    <!-- today time -->
                <p id="today"></p>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <form>
                <div class="mb-3">
                    <label for="fullname" class="form-label">Name</label>
                    <input type="text" class="form-control" id="fullname">

                </div>
                <div class="mb-3">
                    <label for="ph" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="ph" required>

                </div>
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                        required>

                </div>
                <div class="mb-3">
                    <label for="exampleInputPassword1" class="form-label">Password</label>
                    <input type="password" class="form-control" id="exampleInputPassword1" required>
                </div>
                <div class="mb-3">
                    <label for="msg" class="form-label">Message</label>
                    <textarea name="message" id="msg" class="w-100"></textarea>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="exampleCheck1">
                    <label class="form-check-label" for="exampleCheck1">Check box</label>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
            </div>

        </div>
    </section>
