<!-- form valkidation source https://www.geeksforgeeks.org/javascript/form-validation-using-javascript/ -->
    <!-- contact form -->

    <section class="container">
        <div class="row">
            <div class="col text-center ">
                <h3 class="fs-1 py-5">Contact Us</h3>
                
    <!-- today time -->
                <p id="today"></p>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <form>
                    <!-- name -->
                <div class="mb-3">
                    <label for="fullname" class="form-label">Name</label>
                    <input type="text" class="form-control" id="fullname" required>
                    <p class="text-danger" id="errorName"></p>

                </div>
                <!-- ph -->
                <div class="mb-3">
                    <label for="ph" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="ph" required><p class="text-danger" id="errorPh"></p>

                </div>
                <!-- email -->
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                        required><p class="text-danger" id="errorEmail"></p>
        <!-- pass -->
                </div>
                <div class="mb-3">
                    <label for="exampleInputPassword1" class="form-label">Password</label>
                    <input type="password" class="form-control" id="exampleInputPassword1" required><p class="text-danger" id="errorPass"></p>
                </div>
                <div class="mb-3">
                    <label for="msg" class="form-label">Message</label>
                    <textarea name="message" id="msg" class="w-100"></textarea>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="exampleCheck1">
                    <label class="form-check-label" for="exampleCheck1">Check box</label>
                </div>
            <!-- submit with validation -->
                <button type="submit" class="btn btn-primary" onclick="formValidation()">Submit</button>
                <button class="reset-btn" onclick="resetErrors()">Reset</button>

                <!-- <button onclick="validateForm()">Submit</button>
   -->
            </form>
            </div>

        </div>
    </section>

    <!-- map -->
    <section class="container py-5">
        <div class="row justify-content-center">

                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7305.931882840809!2d90.41372559465113!3d23.712910264783865!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3755b9ab6de2be2b%3A0x60d6ef7acaa27a88!2sNarinda%2C%20Dhaka!5e0!3m2!1sen!2sbd!4v1778212438432!5m2!1sen!2sbd"
                    width="100%" height="600" style="border:0;" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
    </section>


    <!-- bootstrap form -------------->

    <form class="row g-3 needs-validation" novalidate>
  <div class="col-md-4">
    <label for="validationCustom01" class="form-label">First name</label>
    <input type="text" class="form-control" id="validationCustom01" value="Mark" required>
    <div class="valid-feedback">
      Looks good!
    </div>
  </div>
  <div class="col-md-4">
    <label for="validationCustom02" class="form-label">Last name</label>
    <input type="text" class="form-control" id="validationCustom02" value="Otto" required>
    <div class="valid-feedback">
      Looks good!
    </div>
  </div>
  <div class="col-md-4">
    <label for="validationCustomUsername" class="form-label">Username</label>
    <div class="input-group has-validation">
      <span class="input-group-text" id="inputGroupPrepend">@</span>
      <input type="text" class="form-control" id="validationCustomUsername" aria-describedby="inputGroupPrepend" required>
      <div class="invalid-feedback">
        Please choose a username.
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <label for="validationCustom03" class="form-label">City</label>
    <input type="text" class="form-control" id="validationCustom03" required>
    <div class="invalid-feedback">
      Please provide a valid city.
    </div>
  </div>
  <div class="col-md-3">
    <label for="validationCustom04" class="form-label">State</label>
    <select class="form-select" id="validationCustom04" required>
      <option selected disabled value="">Choose...</option>
      <option>...</option>
    </select>
    <div class="invalid-feedback">
      Please select a valid state.
    </div>
  </div>
  <div class="col-md-3">
    <label for="validationCustom05" class="form-label">Zip</label>
    <input type="text" class="form-control" id="validationCustom05" required>
    <div class="invalid-feedback">
      Please provide a valid zip.
    </div>
  </div>
  <div class="col-12">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" value="" id="invalidCheck" required>
      <label class="form-check-label" for="invalidCheck">
        Agree to terms and conditions
      </label>
      <div class="invalid-feedback">
        You must agree before submitting.
      </div>
    </div>
  </div>
  <div class="col-12">
    <button class="btn btn-primary" type="submit">Submit form</button>
  </div>
</form>
